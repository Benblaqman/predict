name: Run Wakalio Predictive Engine

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  calculate-predictions:
    runs-on: ubuntu-latest
    # Ruhusa hii ni lazima ili roboti aweze kuandika na ku-push faili la predictions.json kwenye repo yako
    permissions:
      contents: write
      
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup Runtime Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 pandas scipy

      - name: Calculate Poisson and Kelly Metrics
        run: |
          python predict.py

      - name: Push Data to Live Dashboard
        run: |
          git config --global user.name "Wakalio Engine Bot"
          git config --global user.email "engine@wakalio.local"
          git add docs/predictions.json
          git commit -m "Automated prediction update [skip ci]" || echo "No data updates discovered"
          git push
