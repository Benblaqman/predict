<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematical Betting Engine Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px; }
        .wrapper { max-width: 900px; margin: 0 auto; }
        header { border-bottom: 2px solid #22c55e; padding-bottom: 10px; margin-bottom: 30px; }
        h1 { color: #22c55e; margin: 0; }
        .meta { color: #94a3b8; font-size: 0.9rem; }
        .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        .card { background-color: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .fixture { font-size: 1.3rem; font-weight: bold; color: #f1f5f9; margin-bottom: 10px; }
        .badge { background: #22c55e; color: #0f172a; padding: 4px 8px; font-weight: bold; border-radius: 4px; font-size: 0.8rem; }
        .live-hunt { background: #ef4444; color: white; }
        ul { list-style: none; padding: 0; }
        li { padding: 6px 0; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
        .label { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>Wakalio Mathematical Engine</h1>
            <p class="meta">Automated Data Updates: <span id="runtime-stamp">Loading live data feed...</span></p>
        </header>
        <div class="grid" id="dashboard-target"></div>
    </div>

    <script>
        fetch('predictions.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('runtime-stamp').innerText = data.last_updated;
                let html = '';
                data.predictions.forEach(item => {
                    let liveBadge = item.live_value_hunt === "YES" ? `<span class="badge live-hunt">🔥 LIVE VALUE TARGET</span>` : '';
                    html += `
                    <div class="card">
                        <div class="fixture">${item.fixture}</div>
                        <div style="margin-bottom:15px;">
                            <span class="badge">TIP: ${item.recommended_tip}</span>
                            ${liveBadge}
                        </div>
                        <ul>
                            <li><span class="label">Model Probability:</span> <strong>${item.tip_probability}</strong></li>
                            <li><span class="label">Estimated Value Odds:</span> <strong>${item.betika_odds}</strong></li>
                            <li><span class="label">Kelly Criterion Stake:</span> <strong style="color:#22c55e;">${item.kelly_stake}</strong></li>
                            <li><span class="label">1X2 Probabilities:</span> <span>H:${item.raw_probabilities['Home Win']} | D:${item.raw_probabilities['Draw']} | A:${item.raw_probabilities['Away Win']}</span></li>
                        </ul>
                    </div>`;
                });
                document.getElementById('dashboard-target').innerHTML = html;
            }).catch(() => {
                document.getElementById('runtime-stamp').innerText = "Failed to load active predictions. Wait for GitHub Action execution.";
            });
    </script>
</body>
</html>
